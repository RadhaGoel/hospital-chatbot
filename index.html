<!DOCTYPE html>
<html>
<head>
    <title>Hospital AI Assistant</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
        }

        #chatbox {
            width: 400px;
            height: 400px;
            border: 1px solid #ccc;
            margin: auto;
            overflow-y: scroll;
            padding: 10px;
            background: white;
        }

        input {
            width: 300px;
            padding: 10px;
        }

        button {
            padding: 10px;
        }

        .user {
            color: blue;
        }

        .bot {
            color: green;
        }
    </style>
</head>
<body>

<h2>🏥 Hospital AI Assistant</h2>

<div id="chatbox"></div>

<br>

<input id="userInput" placeholder="Enter your symptoms..." />
<button onclick="sendMessage()">Send</button>

<script>
async function sendMessage() {
    let input = document.getElementById("userInput").value;

    let chatbox = document.getElementById("chatbox");

    // Show user message
    chatbox.innerHTML += `<p class="user"><b>You:</b> ${input}</p>`;

    // Call API
    let response = await fetch("http://127.0.0.1:8000/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ query: input })
    });

    let data = await response.json();

    // Show bot response
    chatbox.innerHTML += `<p class="bot"><b>Bot:</b> ${data.response}</p>`;

    // Clear input
    document.getElementById("userInput").value = "";

    // Scroll down
    chatbox.scrollTop = chatbox.scrollHeight;
}
</script>

</body>
</html>
